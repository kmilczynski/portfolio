version: '3.8'

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Mount database directory
      - ./data:/app/data
      # Optional: Mount blog posts if you want to edit them without rebuilding
      - ./src/content:/app/src/content:ro
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change_this_password}
      - DATABASE_URL=sqlite:/app/data/portfolio.db
      - RUST_LOG=${RUST_LOG:-info}
      - PERSEUS_STANDALONE=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge

volumes:
  # Optionally define named volume instead of bind mount
  # portfolio-data:
