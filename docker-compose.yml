services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "[::]:8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change_this_password}
      - DATABASE_URL=sqlite:/app/data/portfolio.db
      - RUST_LOG=${RUST_LOG:-info}
      - PERSEUS_STANDALONE=true
      - "PERSEUS_HOST=::"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://[::1]:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: fd00:dead:beef::/48